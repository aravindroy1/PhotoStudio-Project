apiVersion: v1
kind: Namespace
metadata:
  name: photo-ns
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: photo-config
  namespace: photo-ns
data:
  MONGODB_AUTH_URI: mongodb://mongo:27017/artgallery
  MONGODB_FEEDBACK_URI: mongodb://mongo:27017/artgallery
  MONGODB_URI: mongodb://mongo:27017
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-deployment
  namespace: photo-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: mongo-app
    spec:
      containers:
      - name: mongo-container
        image: mongo:7.0
        ports:
        - containerPort: 27017
        envFrom:
        - configMapRef:
            name: photo-config
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "250m"

---

apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: photo-ns
spec:
  type: ClusterIP
  selector:
    app: mongo-app
  ports:
    - port: 27017
      targetPort: 27017

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: photo-deployment
  namespace: photo-ns
spec:
  replicas: 3
  selector:
    matchLabels:
      app: photo-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: photo-app
    spec:
      containers:
      - name: photo-container
        image: aravindroy1/photo-img:latest
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: photo-config
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: photo-service
  namespace: photo-ns
spec:
  type: NodePort
  selector:
    app: photo-app
  ports:
    - port: 3000
      targetPort: 3000
